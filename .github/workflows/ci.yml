name: CI

# This project's deps.edn pins langgraph via an in-monorepo :local/root
# path (../../kotoba-lang/langgraph), and the :dev alias overrides its
# transitive langchain dependency the same way. Those don't resolve on
# a bare single-repo checkout, so the test job reconstructs the
# workspace layout by checking out both siblings (both PUBLIC) into the
# expected relative paths -- no token needed. Same pattern as
# cloud-itonami-isic-869 / cloud-itonami-isic-0115 / cloud-itonami-
# isic-4920 (this repo's own deps.edn deliberately does NOT also
# depend on kotoba-lang/langchain-store -- see docs/adr/0001-
# architecture.md Decision 7 -- so that sibling is not checked out
# here).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.4
        with: { cli: latest }
      - name: clj-kondo (errors fail the build)
        run: clojure -M:lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: orgs/cloud-itonami/cloud-itonami-isic-4912 }
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langgraph
          path: orgs/kotoba-lang/langgraph
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langchain
          path: orgs/kotoba-lang/langchain
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.4
        with: { cli: latest }
      - name: test (governor contract · self-trip regression · phase · store contract · registry · facts, real compiled StateGraph end-to-end)
        working-directory: orgs/cloud-itonami/cloud-itonami-isic-4912
        run: clojure -M:dev:test
      - name: demo runner (compiled StateGraph, end-to-end)
        working-directory: orgs/cloud-itonami/cloud-itonami-isic-4912
        run: clojure -M:dev:run
